<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - HuisVisual.nl</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. Basis & Variabelen
           ========================================================================== */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-highlight: rgba(255, 255, 255, 0.5);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --glass-glow: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            background-color: #000;
        }

        a, button {
            all: unset;
            cursor: pointer;
        }

        /* ==========================================================================
           2. Full-Screen Achtergrond
           ========================================================================== */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1; /* Gewijzigd van -2 naar 1 */
            opacity: 1; 
            transition: opacity 0.5s ease-in-out; 
            background-color: #111; 
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
            z-index: 2; /* Gewijzigd van -1 naar 2 (ligt óp de foto) */
            pointer-events: none;
        }

        /* ==========================================================================
           3. Liquid Glass Utility
           ========================================================================== */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            box-shadow: 0 15px 35px var(--glass-shadow);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .liquid-glass:hover {
            box-shadow: 0 15px 35px var(--glass-shadow), 0 0 25px var(--glass-glow);
            border-color: rgba(255,255,255,0.4);
        }

        /* ==========================================================================
           4. Layout: Sidebar & Bottom Nav
           ========================================================================== */
        .back-btn {
            position: absolute;
            top: 32px;
            left: 40px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sidebar {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            width: 400px;
            padding: 40px;
            z-index: 10;
        }

        .project-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .project-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #e5e7eb;
            margin-bottom: 32px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .thumbnails-container {
            display: flex;
            gap: 16px;
        }

        .thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .thumb:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.5);
        }

        .thumb.active {
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* ==========================================================================
           5. Instagram Glass Button
           ========================================================================== */
        
.insta-link {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px; /* De kleine afstand tussen de knoppen onderling */
    padding: 12px 16px;
    text-decoration: none;
    color: #ffffff;
    font-size: 0.9rem;
    font-weight: 500;
    
    /* Liquid Glass effect */
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    border-left: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* Deze moet APART staan, buiten de accolades van de eerste .insta-link */
.insta-link:first-of-type {
    margin-top: 40px; /* De grote afstand boven de eerste knop */
}

.insta-link svg {
    flex-shrink: 0;
    transition: transform 0.3s ease;
}

.insta-link:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(255, 255, 255, 0.4);
}

.insta-link:hover svg {
    transform: scale(1.1);
}
        
        /* ==========================================================================
           6. Bottom Nav (Project Schakelaar)
           ========================================================================== */
        .bottom-nav {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 600px;
            padding: 12px 24px;
            border-radius: 100px;
            z-index: 10;
        }

        .nav-btn {
            padding: 12px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ==========================================================================
           7. Responsive
           ========================================================================== */
        @media (max-width: 800px) {
            .back-btn { top: 20px; left: 20px; }
            .sidebar {
                top: auto;
                bottom: 120px;
                left: 20px;
                transform: none;
                width: calc(100% - 40px);
                padding: 24px;
            }
            .project-title { font-size: 2rem; }
            .project-desc { font-size: 0.95rem; margin-bottom: 24px; }
            .thumb { width: 60px; height: 60px; }
            .insta-link { margin-top: 24px; /* Minder afstand op mobiel */ }
            .bottom-nav { width: calc(100% - 40px); bottom: 20px; padding: 8px 16px; }
        }
    </style>
</head>
<body>

    <!-- Dynamische Achtergrond -->
    <div id="background-layer"></div>
    <div class="overlay"></div>

    <!-- Terug naar Home -->
    <a href="index.html" class="back-btn liquid-glass">← Terug naar Home</a>

    <!-- Sidebar -->
    <aside class="sidebar liquid-glass">
        <h1 class="project-title" id="project-title">Project Laden...</h1>
        <p class="project-desc" id="project-desc">Beschrijving laden...</p>
        
        <!-- Thumbnails Container -->
        <div class="thumbnails-container" id="thumbnails-container"></div>

        <!-- Instagram Link -->
        <a href="https://www.instagram.com/huisvisual.nl/" target="_blank" class="insta-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span>Kijk op Insta voor alle foto's.</span>
        </a>
        <a href="https://www.facebook.com/profile.php?id=61572333130670" target="_blank" class="insta-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span>Of kijk op Facebook voor alle foto's.</span>
        </a>
    </aside>

    <!-- Project Schakelaar -->
    <nav class="bottom-nav liquid-glass">
        <button class="nav-btn" id="btn-prev">
            <span>←</span> Vorig Project
        </button>
        <button class="nav-btn" id="btn-next">
            Volgend Project <span>→</span>
        </button>
    </nav>

    <!-- JAVASCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("DOM volledig geladen. Initialiseren van Portfolio Script...");

            // --- 1. Data Structuur ---
            const projects = [
                {
                    title: "Moderne luxe badkamer",
                    desc: "Deze badkamer straalt rust en luxe uit. Strakke vormen en warme kleuren komen hier samen. De zwarte kranen en douchewand geven een mooi contrast met de grote, warme tegels. De indirecte, warme LED-lampjes achter de spiegel en de spotjes zorgen voor een echte spa-sfeer.",
                    images: [
                        "https://huisvisual.x02.me/i/CU9H.png",
                        "https://huisvisual.x02.me/i/JJGM65.png",
                        "https://huisvisual.x02.me/i/NBMC.png"
                    ]
                },
                {
                    title: "Prachtige villa",
                    desc: "Dit huis combineert een modern ontwerp met een warme uitstraling. De strakke, donkere gevels met witte muren vormen een stijlvol contrast met de houten details en de grote ramen. Dankzij de ruime lichtinval en de natuurlijke materialen voelt de woning direct vertrouwd aan.",
                    images: [
                        "https://huisvisual.x02.me/i/M9DHU.png",
                        "https://huisvisual.x02.me/i/CYSWBJ.png",
                        "https://huisvisual.x02.me/i/6ANV.png"
                    ]
                },
                {
                    title: "Sfeervolle keuken",
                    desc: "Deze visualisatie laat zien hoe mooi een landelijke keuken kan zijn. Er is veel aandacht besteed aan de materialen, zoals het warme donkerhout en het marmere aanrechtblad. Door het olijfgroene stucwerk en de diepgroene tegels krijgt de keuken een eigen, warme sfeer.",
                    images: [
                        "assets/project3-main.jpg",
                        "assets/project3-thumb1.jpg",
                        "assets/project3-thumb2.jpg"
                    ]
                },
                {
                    title: "Bungalow",
                    desc: "Mooie bungalow met houten accenten en gelegen in een rustige straat.",
                    images: [
                        "https://huisvisual.x02.me/i/F4HPBM.png",
                        "https://huisvisual.x02.me/i/85ET2E.png",
                        "https://huisvisual.x02.me/i/RUC2.png"
                    ]
                },
                {
                    title: "50m2 Aanbouw",
                    desc: "Een moderne aanbouw met antraciet metselwerk en een strak plat dak en overstek. De grote glazen pui zorgt voor maximale lichtinval en een directe verbinding met de tuin vanuit de slaapkamer.",
                    images: [
                        "https://huisvisual.x02.me/i/AU98Q7.png",
                        "https://huisvisual.x02.me/i/MSQBJV.png",
                        "https://huisvisual.x02.me/i/CQQUX.png"
                    ]
                },
                {
                    title: "Keuken in woonkamer",
                    desc: "Deze moderne keuken straalt een minimalistische rust uit door de combinatie van warme houtlook fronten en een strak, wit marmeren kookeiland. Dankzij de greeploze kasten en ingebouwde apperatuur ziet het er altijd opgeruimd uit.",
                    images: [
                        "https://huisvisual.x02.me/i/A4UDW.png",
                        "https://huisvisual.x02.me/i/GKJBD.png",
                        "https://huisvisual.x02.me/i/8234PA.png"
                    ]
                },
                {
                    title: "Schitterende badkamer",
                    desc: "Een prachtige badkamer waar perfect gebruik is gemaakt van de ruimte, de stenen tegels geven een mooi relief, de zwevende meubels en glazen douchewand zorgen ervoor dat de ruimte open voelt.",
                    images: [
                        "https://huisvisual.x02.me/i/EVB87U.png",
                        "https://huisvisual.x02.me/i/X9M9.png",
                        "https://huisvisual.x02.me/i/R39CGG.png"
                    ]
                }
            ];

            // --- 2. Variabelen en DOM Elementen Selecteren ---
            let currentProjectIndex = 0;

            const bgLayer = document.getElementById('background-layer');
            const titleEl = document.getElementById('project-title');
            const descEl = document.getElementById('project-desc');
            const thumbsContainer = document.getElementById('thumbnails-container');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');

            // Dubbelcheck of alle elementen bestaan
            if (!bgLayer) console.error("CRITICAL ERROR: '#background-layer' niet gevonden in de HTML!");
            if (!thumbsContainer) console.error("CRITICAL ERROR: '#thumbnails-container' niet gevonden in de HTML!");

            // --- 3. Functionaliteit ---

            // Bulletproof functie om afbeelding te veranderen
            function changeBackground(imgSrc, thumbElement) {
                console.log(`[Achtergrond Actie] Verzoek om afbeelding te laden: "${imgSrc}"`);

                // 1. Update actieve thumbnail styling direct voor een snelle UI feedback
                if (thumbElement) {
                    const allThumbs = document.querySelectorAll('.thumb');
                    allThumbs.forEach(t => t.classList.remove('active'));
                    thumbElement.classList.add('active');
                }

                // 2. Begin met het uitfaden van de huidige afbeelding
                bgLayer.style.opacity = '0';

                // 3. Creëer een Image object om te checken of het bestand echt bestaat
                const imgPreload = new Image();

                // 4A. Als het pad klopt en de afbeelding succesvol is binnengehaald:
                imgPreload.onload = () => {
                    console.log(`✅ [Succes] Afbeelding gevonden en geladen: "${imgSrc}"`);
                    
                    // Wacht precies zolang als de CSS overgang duurt (500ms) voordat je wisselt
                    setTimeout(() => {
                        bgLayer.style.backgroundImage = `url('${imgSrc}')`;
                        bgLayer.style.opacity = '1'; // Fade weer netjes in
                    }, 500);
                };

                // 4B. Als het bestandspad niet klopt of de foto mist:
                imgPreload.onerror = () => {
                    console.error(`❌ [FOUT] Afbeelding kan niet worden geladen. Bestaat de map/foto? Pad: "${imgSrc}"`);
                    
                    // Als er een fout is, zorg dat de container weer zichtbaar wordt (voorkomt vastzitten in zwart scherm)
                    setTimeout(() => {
                        bgLayer.style.opacity = '1'; 
                    }, 500);
                };

                // Dit start het daadwerkelijke laad/check-proces
                imgPreload.src = imgSrc;
            }

            function loadProject(index) {
                console.log(`--- Laden van project Index: ${index} ---`);
                const project = projects[index];
                
                // Update Tekst
                titleEl.innerText = project.title;
                descEl.innerText = project.desc;

                // Wis oude thumbnails
                thumbsContainer.innerHTML = '';

                // Genereer nieuwe thumbnails
                project.images.forEach((imgSrc, i) => {
                    const thumb = document.createElement('div');
                    thumb.classList.add('thumb');
                    
                    if (i === 0) thumb.classList.add('active');
                    
                    thumb.style.backgroundImage = `url('${imgSrc}')`;
                    
                    // Koppel de click event
                    thumb.addEventListener('click', () => {
                        changeBackground(imgSrc, thumb);
                    });
                    
                    thumbsContainer.appendChild(thumb);
                });

                // Zet de achtergrond naar de eerste foto van het zojuist geladen project
                changeBackground(project.images[0], thumbsContainer.firstChild);
            }

            // --- 4. Event Listeners voor navigatie ---
            btnNext.addEventListener('click', () => {
                currentProjectIndex++;
                if (currentProjectIndex >= projects.length) currentProjectIndex = 0;
                loadProject(currentProjectIndex);
            });

            btnPrev.addEventListener('click', () => {
                currentProjectIndex--;
                if (currentProjectIndex < 0) currentProjectIndex = projects.length - 1;
                loadProject(currentProjectIndex);
            });

            // --- 5. Preloader & Initialisatie ---
            console.log("Starten met pre-loaden van afbeeldingen...");
            projects.forEach(p => {
                p.images.forEach(src => {
                    const preImage = new Image();
                    preImage.src = src;
                });
            });

            // Laad het eerste project bij de start
            loadProject(currentProjectIndex);
            
        }); // Einde DOMContentLoaded
    </script>
</body>
</html>
